name: Run Job Scraper

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Code branch to run (feature/jobspy or feature/linkedin-only)"
        required: false
        default: "feature/jobspy"
      hours_old:
        description: "Only fetch jobs posted in the last N hours"
        required: false
        default: "12"
      sheet_name:
        description: "Sheet tab to write jobs into (created if it doesn't exist)"
        required: false
        default: "Tracking Template"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config.py
        env:
          HOURS_OLD: ${{ github.event.inputs.hours_old }}
          SHEET_NAME: ${{ github.event.inputs.sheet_name }}
        run: |
          python - <<'EOF'
          import os, textwrap
          hours_old = int(os.environ.get("HOURS_OLD") or 12)
          sheet_name = os.environ.get("SHEET_NAME") or "Tracking Template"
          snippet = textwrap.dedent(f"""
              import os
              from dotenv import load_dotenv
              load_dotenv()
              class Config:
                  SEARCH_TERM = "software engineer"
                  LOCATION = "San Francisco, CA"
                  RESULTS_WANTED = 20
                  HOURS_OLD = {hours_old}
                  DISTANCE = 50
                  SITE_NAMES = ["linkedin", "indeed"]
                  IS_REMOTE = False
                  JOB_TYPE = "fulltime"
                  EXPERIENCE_LEVEL = "entry level"
                  LINKEDIN_FETCH_DESCRIPTION = True
                  SHEET_TAB_NAME = "{sheet_name}"
                  STATUS_ON_SCRAPE = "Have Not Applied"
                  GEMINI_API_KEY = os.getenv("GEMINI_API_KEY")
          """).strip()
          with open("config.py", "w") as f:
              f.write(snippet + "\n")
          EOF

      - name: Write Google Sheets credentials
        env:
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
        run: echo "$GOOGLE_SHEETS_CREDS" > credentials.json

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python main.py
