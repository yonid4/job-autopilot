name: Run Job Scraper

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Code branch to run (feature/jobspy or feature/linkedin-only)"
        required: false
        default: "feature/jobspy"
      hours_old:
        description: "Only fetch jobs posted in the last N hours"
        required: false
        default: "12"
      sheet_name:
        description: "Sheet tab to write jobs into (created if it doesn't exist)"
        required: false
        default: "Tracking Template"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config.py
        env:
          HOURS_OLD: ${{ github.event.inputs.hours_old }}
          SHEET_NAME: ${{ github.event.inputs.sheet_name }}
        run: |
          python - <<'EOF'
          import os, textwrap
          hours_old = int(os.environ.get("HOURS_OLD") or 12)
          sheet_name = os.environ.get("SHEET_NAME") or "Tracking Template"
          snippet = textwrap.dedent(f"""
              import os
              from dotenv import load_dotenv
              load_dotenv()
              class Config:
                  SEARCH_TERM = "Software Engineer"
                  LOCATION = "Mountain View, CA"
                  RESULTS_WANTED = 500
                  HOURS_OLD = {hours_old}
                  DISTANCE = 50
                  SITE_NAMES = ["linkedin", "indeed", "glassdoor", "zip_recruiter"]
                  BLOCKED_COMPANIES: list[str] = ["Revature", "Epic"]
                  IS_REMOTE = False
                  JOB_TYPE = "fulltime"
                  EXPERIENCE_LEVEL = "entry level"
                  LINKEDIN_FETCH_DESCRIPTION = True
                  LINKEDIN_LI_AT = os.getenv("LINKEDIN_LI_AT")
                  LINKEDIN_JSESSIONID = os.getenv("LINKEDIN_JSESSIONID")
                  SHEET_TAB_NAME = "{sheet_name}"
                  STATUS_ON_SCRAPE = "Have Not Applied"
                  _proxies_raw = os.getenv("PROXIES")
                  PROXIES = [p.strip() for p in _proxies_raw.split(",")] if _proxies_raw else None
                  GEMINI_API_KEY = os.getenv("GEMINI_API_KEY")
                  _gemini_keys_raw = os.getenv("GEMINI_API_KEYS")
                  GEMINI_API_KEYS: list[str] = (
                      [k.strip() for k in _gemini_keys_raw.split(",") if k.strip()]
                      if _gemini_keys_raw
                      else ([GEMINI_API_KEY] if GEMINI_API_KEY else [])
                  )
                  GEMINI_PRIMARY_MODEL = os.getenv("GEMINI_PRIMARY_MODEL", "gemini-2.5-flash")
                  GEMINI_FALLBACK_MODEL = os.getenv("GEMINI_FALLBACK_MODEL", "gemini-2.0-flash")
                  GEMINI_BATCH_DELAY_SECONDS = 15
          """).strip()
          with open("config.py", "w") as f:
              f.write(snippet + "\n")
          EOF

      - name: Write credentials and resume
        env:
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          RESUME_JSON: ${{ secrets.RESUME_JSON }}
        run: |
          echo "$GOOGLE_SHEETS_CREDS" > credentials.json
          echo "$RESUME_JSON" > resume.json

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GOOGLE_SHEET_ID: ${{ secrets.SPREAD_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
          PROXIES: ${{ secrets.PROXIES }}
        run: python main.py
